services:
  mongodb:
    image: mongo:7
    container_name: smartleads-db
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: smartleads-server
    ports:
      - "5000:5000"
    env_file: .env
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: smartleads-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
